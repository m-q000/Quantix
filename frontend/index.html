<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Q-Zone | Civic Vendor Management</title>
    
    <!-- Mapbox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    
    <!-- Custom Web Fonts (using Fontshare for distinct, modern aesthetics) -->
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,700,500,400&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    
    <!-- Remix Icons for crisp, recognizable icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Map Container -->
    <div id="map"></div>

    <!-- UI Overlay Layer -->
    <div class="ui-layer">
        
        <!-- Top Navigation & Mode Switcher -->
        <header class="top-layer">
            <div class="glass-header">
                <div class="brand">
                    <div class="dot active"></div>
                    <h1>Q-Zone</h1>
                </div>
                
                <div class="mode-toggles">
                    <button class="mode-btn active" data-mode="citizen">Citizen</button>
                    <button class="mode-btn" data-mode="vendor">Vendor</button>
                    <button class="mode-btn" data-mode="admin">Admin</button>
                </div>
                
                <button class="menu-btn" aria-label="Menu">
                    <i class="ri-menu-4-line"></i>
                </button>
            </div>
        </header>

        <!-- Floating Notifications / Status -->
        <div class="status-pill hidden" id="status-pill">
            <i class="ri-map-pin-line"></i>
            <span>Select a spot on the map</span>
        </div>

        <!-- Main Action Button (Vendor Flow) -->
        <button id="main-fab" class="fab hidden">
            <div class="fab-content">
                <span>Book Spot</span>
                <i class="ri-arrow-right-line"></i>
            </div>
        </button>

        <!-- Dynamic Bottom Sheet -->
        <div id="bottom-sheet" class="bottom-sheet hidden">
            <div class="sheet-handle-container" id="sheet-drag-handle">
                <div class="sheet-handle"></div>
            </div>
            
            <div id="sheet-content" class="sheet-content">
                <!-- Content injected via JS -->
            </div>
        </div>
        
    </div>

    <!-- Mapbox Map Core script -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="script.js"></script>
</body>
</html>
